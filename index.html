  <script>
    // Force mobile layout on real phone/tablet screens even if "Request Desktop Site" is enabled.
    // Requires BOTH: narrow screen width AND touch capability (to exclude laptops).
    (function(){
      var hasTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
      var isNarrow = screen.width < 768;
      if (hasTouch && isNarrow) {
        document.documentElement.classList.add('force-mobile');
      }
    })();
  </script>
